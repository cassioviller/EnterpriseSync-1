{% extends "base_completo.html" %}
{% block title %}Novo Orçamento{% endblock %}
{% block content %}
<div class="container py-3">
  <h4><i class="fas fa-calculator me-2"></i> Novo Orçamento</h4>
  <form method="POST" class="card card-body mt-3">
    <div class="row g-3">
      <div class="col-md-8">
        <label class="form-label">Título *</label>
        <input class="form-control" name="titulo" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Cliente</label>
        <select class="form-select" name="cliente_id">
          <option value="">— selecione —</option>
          {% for c in clientes %}<option value="{{ c.id }}">{{ c.nome }}</option>{% endfor %}
        </select>
      </div>
      <div class="col-md-12">
        <label class="form-label">Descrição</label>
        <textarea class="form-control" name="descricao" rows="2"></textarea>
      </div>
      <div class="col-md-6">
        <label class="form-label">Imposto global (%)</label>
        <input class="form-control" name="imposto_pct_global" type="text" inputmode="decimal" step="0.01"
               value="{{ config.imposto_pct_padrao if config else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Margem global (%)</label>
        <input class="form-control" name="margem_pct_global" type="text" inputmode="decimal" step="0.01"
               value="{{ config.lucro_pct_padrao if config else '' }}">
      </div>
    </div>
    <div class="mt-3 text-end">
      <a href="{{ url_for('orcamentos.listar') }}" class="btn btn-outline-secondary">Cancelar</a>
      <button class="btn btn-primary"><i class="fas fa-save me-1"></i> Criar e abrir editor</button>
    </div>
  </form>
</div>
{% endblock %}
