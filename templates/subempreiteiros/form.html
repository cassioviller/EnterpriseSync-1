{% extends "base_completo.html" %}

{% block title %}{{ 'Editar' if sub else 'Novo' }} Subempreiteiro{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">
            <i class="fas fa-hammer me-2 text-primary"></i>
            {{ 'Editar Subempreiteiro' if sub else 'Novo Subempreiteiro' }}
        </h1>
        <a href="{{ url_for('subempreiteiros.listar') }}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left"></i> Voltar
        </a>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="post" autocomplete="off">
                <div class="row g-3">
                    <div class="col-md-8">
                        <label class="form-label">Nome / Razão Social <span class="text-danger">*</span></label>
                        <input type="text" name="nome" class="form-control" required value="{{ sub.nome if sub else '' }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">CNPJ</label>
                        <input type="text" name="cnpj" class="form-control" maxlength="20" value="{{ sub.cnpj if sub else '' }}" placeholder="Apenas números">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Especialidade</label>
                        <input type="text" name="especialidade" class="form-control" value="{{ sub.especialidade if sub else '' }}" placeholder="Alvenaria, hidráulica, elétrica...">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Contato Responsável</label>
                        <input type="text" name="contato_responsavel" class="form-control" value="{{ sub.contato_responsavel if sub else '' }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Telefone</label>
                        <input type="text" name="telefone" class="form-control" value="{{ sub.telefone if sub else '' }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">E-mail</label>
                        <input type="email" name="email" class="form-control" value="{{ sub.email if sub else '' }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Chave PIX</label>
                        <input type="text" name="chave_pix" class="form-control" value="{{ sub.chave_pix if sub else '' }}">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Observações</label>
                        <textarea name="observacoes" class="form-control" rows="3">{{ sub.observacoes if sub else '' }}</textarea>
                    </div>
                </div>
                <div class="text-end mt-4">
                    <a href="{{ url_for('subempreiteiros.listar') }}" class="btn btn-light">Cancelar</a>
                    <button class="btn btn-primary"><i class="fas fa-save"></i> Salvar</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
