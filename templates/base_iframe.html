<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}SIGE{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <script src="{{ url_for('static', filename='js/vendor/chart.js') }}"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}?v=20250918_1">

    {% if sige_theme %}
    <style id="sige-theme-vars">
      :root {
        --sige-primary: {{ sige_theme.cor_primaria }};
        --sige-primary-strong: {{ sige_theme.cor_primaria }};
        --sige-secondary: {{ sige_theme.cor_secundaria }};
        --sige-header: {{ sige_theme.cor_header_nav }};
        --sige-on-header: {{ sige_theme.cor_texto_header }};
        --sige-on-primary: {{ sige_theme.cor_texto_primaria }};
        --sige-bg: {{ sige_theme.cor_fundo_app }};
      }
    </style>
    {% endif %}

    <style>
        body {
            background-color: #f8f9fa !important;
            color: #212529 !important;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif !important;
            padding-top: 0 !important;
            margin: 0;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

{% block extra_js %}{% endblock %}

<script>
(function() {
    var token = document.querySelector('meta[name="csrf-token"]');
    if (!token) return;
    token = token.getAttribute('content');

    var observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
            mutation.addedNodes.forEach(function(node) {
                if (node.nodeType === 1) {
                    var forms = node.tagName === 'FORM' ? [node] : node.querySelectorAll ? node.querySelectorAll('form') : [];
                    forms.forEach(function(form) {
                        if (!form.querySelector('input[name="csrf_token"]')) {
                            var input = document.createElement('input');
                            input.type = 'hidden';
                            input.name = 'csrf_token';
                            input.value = token;
                            form.appendChild(input);
                        }
                    });
                }
            });
        });
    });
    observer.observe(document.body, { childList: true, subtree: true });

    if (typeof $ !== 'undefined' && $.ajaxSetup) {
        $.ajaxSetup({
            beforeSend: function(xhr, settings) {
                if (!/^(GET|HEAD|OPTIONS|TRACE)$/i.test(settings.type)) {
                    xhr.setRequestHeader("X-CSRFToken", token);
                }
            }
        });
    }

    var originalFetch = window.fetch;
    window.fetch = function(url, options) {
        options = options || {};
        if (options.method && !/^(GET|HEAD|OPTIONS|TRACE)$/i.test(options.method)) {
            options.headers = options.headers || {};
            if (options.headers instanceof Headers) {
                if (!options.headers.has('X-CSRFToken')) options.headers.set('X-CSRFToken', token);
            } else {
                if (!options.headers['X-CSRFToken']) options.headers['X-CSRFToken'] = token;
            }
        }
        return originalFetch.call(this, url, options);
    };
})();
</script>
</body>
</html>
