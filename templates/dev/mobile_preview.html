<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mobile Preview — SIGE</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
  body { background: #1f2937; color: #e5e7eb; font-family: 'Inter', sans-serif; margin: 0; min-height: 100vh; }
  .toolbar { background: #111827; border-bottom: 1px solid #374151; padding: 12px 16px;
             display: flex; flex-wrap: wrap; gap: 10px; align-items: center; position: sticky; top: 0; z-index: 10; }
  .toolbar h5 { margin: 0; font-weight: 700; color: #fff; font-size: 1rem; }
  .toolbar .form-select, .toolbar .form-control { background: #1f2937; color: #e5e7eb; border-color: #374151; }
  .toolbar .form-select:focus, .toolbar .form-control:focus { background: #1f2937; color: #fff; }
  .stage { display: flex; justify-content: center; padding: 24px 12px 80px; }
  .device {
      background: #111827; border: 14px solid #0b1220; border-radius: 38px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
      overflow: hidden; position: relative; transition: width .25s ease, height .25s ease;
  }
  .device::before {
      content: ""; position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
      width: 110px; height: 22px; background: #0b1220; border-radius: 0 0 16px 16px; z-index: 2;
  }
  .device iframe { display: block; width: 100%; height: 100%; border: 0; background: #fff; }
  .meta { color: #9ca3af; font-size: .8rem; }
  .preset-btns .btn { font-size: .72rem; padding: 4px 10px; }
  a.btn-link { color: #93c5fd; }
</style>
</head>
<body>
<div class="toolbar">
  <h5><i class="fas fa-mobile-screen me-2"></i>Mobile Preview</h5>

  <form class="d-flex flex-wrap gap-2 align-items-center" id="frmCfg" onsubmit="return false;">
    <label class="meta">Tela:</label>
    <select id="selTarget" class="form-select form-select-sm" style="min-width:220px">
      <option value="/dashboard">Dashboard</option>
      <option value="/obras">Obras — listagem</option>
      <option value="/funcionario/rdo/consolidado">RDO — consolidado</option>
      <option value="/cronograma">Cronograma — listagem</option>
      <option value="/financeiro/dashboard">Financeiro — dashboard</option>
      <option value="/funcionarios">Funcionários — listagem</option>
      <option value="/equipe">Equipe</option>
      <option value="/manual">Manual do Usuário</option>
      <option value="__custom__">URL personalizada…</option>
    </select>
    <input id="inpCustom" class="form-control form-control-sm d-none" placeholder="/caminho" style="min-width:220px">

    <label class="meta">Tamanho:</label>
    <select id="selSize" class="form-select form-select-sm">
      <option value="360x640">360 × 640 (Android pequeno)</option>
      <option value="390x780" selected>390 × 780 (iPhone 14)</option>
      <option value="414x896">414 × 896 (iPhone XR)</option>
      <option value="430x932">430 × 932 (iPhone 15 Pro Max)</option>
      <option value="768x1024">768 × 1024 (iPad portrait)</option>
    </select>

    <label class="meta">Orientação:</label>
    <div class="btn-group btn-group-sm" role="group" aria-label="Orientação">
      <input type="radio" class="btn-check" name="orient" id="orientP" value="portrait" autocomplete="off">
      <label class="btn btn-outline-light" for="orientP" title="Retrato"><i class="fas fa-mobile-screen"></i></label>
      <input type="radio" class="btn-check" name="orient" id="orientL" value="landscape" autocomplete="off">
      <label class="btn btn-outline-light" for="orientL" title="Paisagem"><i class="fas fa-mobile-screen fa-rotate-90"></i></label>
    </div>

    <button class="btn btn-sm btn-success" id="btnReload"><i class="fas fa-rotate-right me-1"></i>Recarregar</button>
    <a class="btn btn-sm btn-outline-light" id="btnOpen" target="_blank" rel="noopener">
      <i class="fas fa-up-right-from-square me-1"></i>Abrir em nova aba
    </a>
  </form>
</div>

<div class="preset-btns text-center mt-2">
  <span class="meta me-2">Atalhos:</span>
  <a class="btn btn-sm btn-outline-light me-1" href="?target=/obras&amp;w=390&amp;h=780">Obras</a>
  <a class="btn btn-sm btn-outline-light me-1" href="?target=/funcionario/rdo/consolidado&amp;w=390&amp;h=780">RDO</a>
  <a class="btn btn-sm btn-outline-light me-1" href="?target=/cronograma&amp;w=390&amp;h=780">Cronograma</a>
  <a class="btn btn-sm btn-outline-light me-1" href="?target=/financeiro/dashboard&amp;w=390&amp;h=780">Financeiro</a>
  <a class="btn btn-sm btn-outline-light me-1" href="?target=/funcionarios&amp;w=390&amp;h=780">Funcionários</a>
</div>

<div class="stage">
  <div id="device" class="device" style="width:{{ width }}px; height:{{ height }}px;">
    <iframe id="frame" src="{{ target }}"></iframe>
  </div>
</div>

<script>
(function(){
  const initialTarget = {{ target|tojson }};
  const initialW = {{ width|tojson }};
  const initialH = {{ height|tojson }};
  const initialOrient = {{ orientation|tojson }};
  const sel = document.getElementById('selTarget');
  const inp = document.getElementById('inpCustom');
  const size = document.getElementById('selSize');
  const dev = document.getElementById('device');
  const frame = document.getElementById('frame');
  const btnReload = document.getElementById('btnReload');
  const btnOpen = document.getElementById('btnOpen');
  const orientRadios = document.querySelectorAll('input[name="orient"]');
  function currentOrient(){
    for (const r of orientRadios) if (r.checked) return r.value;
    return 'portrait';
  }
  for (const r of orientRadios) if (r.value === initialOrient) r.checked = true;
  if (!document.querySelector('input[name="orient"]:checked')) {
    document.getElementById('orientP').checked = true;
  }

  // Set initial target
  let matched = false;
  for (const opt of sel.options) {
    if (opt.value === initialTarget) { sel.value = opt.value; matched = true; break; }
  }
  if (!matched) {
    sel.value = '__custom__';
    inp.classList.remove('d-none');
    inp.value = initialTarget;
  }
  size.value = `${initialW}x${initialH}`;
  btnOpen.href = initialTarget;

  function currentTarget() {
    if (sel.value === '__custom__') return inp.value || '/';
    return sel.value;
  }
  function applySize() {
    let [w, h] = size.value.split('x').map(Number);
    if (currentOrient() === 'landscape') { const t = w; w = h; h = t; }
    dev.style.width = w + 'px';
    dev.style.height = h + 'px';
  }
  function reload() {
    const t = currentTarget();
    frame.src = t;
    btnOpen.href = t;
    const url = new URL(window.location.href);
    url.searchParams.set('target', t);
    const [w, h] = size.value.split('x');
    url.searchParams.set('w', w);
    url.searchParams.set('h', h);
    url.searchParams.set('orientation', currentOrient());
    history.replaceState({}, '', url.toString());
  }
  sel.addEventListener('change', () => {
    inp.classList.toggle('d-none', sel.value !== '__custom__');
    reload();
  });
  inp.addEventListener('change', reload);
  size.addEventListener('change', () => { applySize(); reload(); });
  for (const r of orientRadios) r.addEventListener('change', () => { applySize(); reload(); });
  btnReload.addEventListener('click', reload);
  applySize();
})();
</script>
</body>
</html>
