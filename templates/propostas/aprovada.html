<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposta Aprovada</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #007bff 0%, #6c757d 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .confirm-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            max-width: 520px;
            width: 100%;
            padding: 48px 32px;
            text-align: center;
        }
        .confirm-icon {
            font-size: 4.5rem;
            color: #28a745;
            margin-bottom: 20px;
        }
        .confirm-title {
            font-weight: 700;
            color: #212529;
            margin-bottom: 16px;
        }
        .confirm-message {
            color: #6c757d;
            font-size: 1.1rem;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="confirm-card">
        <div class="confirm-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1 class="confirm-title">Aprovado!</h1>
        <p class="confirm-message">Obrigado, a equipe entrará em contato.</p>
    </div>
</body>
</html>
