# Fase 0.5 / 2.1 — dependências de DESENVOLVIMENTO fora do runtime.
# `pytest`, `pytest-html`, `ruff` e `playwright` estavam em `dependencies` e
# viajavam para a imagem de produção — o playwright inclusive baixa binários
# de browser. Instale com `uv sync --group dev` ou `pip install ".[dev]"`.
[dependency-groups]
dev = [
    "pytest>=8.4.1",
    "pytest-html>=4.2.0",
    "pytest-timeout>=2.3.1",
    "playwright>=1.58.0",
    "ruff>=0.6",
    "mpxj>=16.5.0",
    "jpype1>=1.7.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.4.1",
    "pytest-html>=4.2.0",
    "pytest-timeout>=2.3.1",
    "playwright>=1.58.0",
    "ruff>=0.6",
    "mpxj>=16.5.0",
    "jpype1>=1.7.1",
]

[tool.pytest.ini_options]
# Fase 0.5 / 2.2 — `--strict-markers`: marker com typo passa a ser ERRO, não
# warning silencioso. `--timeout`: sem isso um teste travado pendura o CI
# indefinidamente (não havia timeout algum).
addopts = "--strict-markers --timeout=300"
markers = [
    "smoke: testes de fumaça",
    "integration: testes de integração E2E",
    "browser: testes que requerem Playwright (browser real)",
    "java: testes que sobem a JVM/MPXJ (skip sem JDK completo)",
]

[tool.ruff]
target-version = "py311"
line-length = 100
# Auditoria de higiene; não reformatar o mundo. Regras seguras e de detecção.
extend-exclude = [
    ".pythonlibs", "__pycache__", "archive", "backups", "attached_assets",
    "migrations.py", "uv.lock",
]

[tool.ruff.lint]
# F = pyflakes (imports/vars não usados, redefinição), E9 = erros de sintaxe,
# B = bugbear (bare except, etc.). Conservador de propósito.
select = ["F", "E9", "B"]
ignore = []
