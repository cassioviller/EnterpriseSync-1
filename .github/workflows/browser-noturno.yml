# Testes de browser — noturno, NÃO bloqueante (Fase 0.5 / 2.2)
#
# 200 testes Playwright (~23% da suíte) que o gate exclui. O gate não executa
# uma única linha de JavaScript, e é exatamente aí que vivem as regressões
# que o repositório mais documenta (formato BR, block scripts, cascata de
# subgrupos no RDO). Rodam à noite, fora do caminho crítico do PR.
name: browser-noturno

on:
  schedule:
    - cron: '0 6 * * *'   # 03h America/Sao_Paulo
  workflow_dispatch:

jobs:
  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    continue-on-error: true   # informativo enquanto os wrappers main()/sys.exit() não forem granularizados

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sige
          POSTGRES_PASSWORD: sige
          POSTGRES_DB: sige_ci
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 10

    env:
      DATABASE_URL: postgresql://sige:sige@localhost:5432/sige_ci?sslmode=disable
      SESSION_SECRET: ci-ephemeral-secret-not-used-in-production
      SIGE_ENV: ci

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install uv==0.5.*
      - run: uv sync --frozen --group dev
      - run: uv run playwright install --with-deps chromium
      - run: uv run python pre_start.py
      - name: Seed
        run: uv run python scripts/seed_demo_alfa.py --ambiente ci || true
        env:
          SIGE_ENABLE_DEMO_SEED: 'true'
          SIGE_ALLOW_PROD_SEED: '1'
      - name: Subir servidor
        run: |
          uv run gunicorn --bind 0.0.0.0:5000 --workers 2 --daemon main:app
          for i in $(seq 1 30); do curl -sf http://localhost:5000/ && break; sleep 2; done
      - name: Playwright
        run: uv run pytest tests/ -m browser -q --junitxml=browser-report.xml
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: browser-report
          path: browser-report.xml
          if-no-files-found: ignore
